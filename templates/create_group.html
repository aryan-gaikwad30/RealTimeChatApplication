<!DOCTYPE html>
<html>

<head>
    <title>Create Group</title>
</head>

<body>

<h1>Create Group</h1>

<form method="POST">

<input
type="text"
name="group_name"
placeholder="Group Name"
required>

<br><br>
<h3>

Members

</h3>

{% for user in users %}

<input
type="checkbox"
name="members"
value="{{ user.id }}">

{{ user.username }}

<br>

{% endfor %}

<br>

<button>

Create

</button>

</form>

<br>

<a href="/dashboard">

Back

</a>

</body>

</html>
