{% extends "base.html" %}

{% block content %}

<div class="auth-container">

<h1>

Register

</h1>

<form method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Register

</button>

</form>

<a href="/login">

Already have an account?

</a>

</div>

{% endblock %}
