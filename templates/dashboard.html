{% extends "base.html" %}

{% block content %}

<div class="dashboard">

<h1>

Welcome {{ current_user.username }}

</h1>

<br>

<div class="card">

<h2>

Users

</h2>

{% for user in users %}

<div class="user-item">

<a href="/chat/{{ user.id }}">

{{ user.username }}

</a>

</div>

{% endfor %}

</div>

<div class="card">

<h2>

My Groups

</h2>

{% for group in groups %}

<div class="group-item">

<a href="/group_chat/{{ group.id }}">

{{ group.name }}

</a>

|

<a href="/leave_group/{{ group.id }}">

Leave

</a>

</div>

{% endfor %}

</div>

<div class="card">

<a href="/create_group">

Create Group

</a>

</div>

<br>

<a href="/logout">

<button class="logout-btn">

Logout

</button>

</a>

</div>

{% endblock %}
