<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
</head>
<body>

<h1>Welcome {{ current_user.username }}</h1>

<h2>Users</h2>

<ul>

{% for user in users %}

<li>

<a href="/chat/{{ user.id }}">

{{ user.username }}

</a>

</li>

{% endfor %}

</ul>

<hr>

<h2>

My Groups

</h2>

<ul>

{% for group in groups %}

<li>

<a href="/group_chat/{{ group.id }}">

{{ group.name }}

</a>

</li>

{% endfor %}

</ul>

<br>

<a href="/create_group">

Create Group

</a>

<br><br>

<br>

<a href="/logout">

Logout

</a>

</body>
</html>
