{% extends "base.html" %}

{% block content %}

<div class="auth-container">

<h1>

Login

</h1>

<form method="POST">

<input
type="email"
name="email"
placeholder="Email"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button type="submit">

Login

</button>

</form>

{% if error %}

<p>

{{ error }}

</p>

{% endif %}

<a href="/register">

Create new account

</a>

</div>

{% endblock %}
