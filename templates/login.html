<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
</head>
<body>

<h1>Login</h1>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <br><br>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <br><br>

    <button type="submit">
        Login
    </button>
    {% if error %}

<p>

{{ error }}

</p>

{% endif %}

<br><br>

Don't have an account?

<a href="/register">

Register

</a>

</form>

</body>
</html>
